project:
  name: churnops
  root_dir: ..

data:
  raw_data_path: data/raw/customer_churn.csv
  target_column: Churn
  positive_class: "Yes"
  column_renames:
    CustomerID: customerID
    Gender: gender
    Senior Citizen: SeniorCitizen
    Phone Service: PhoneService
    Multiple Lines: MultipleLines
    Internet Service: InternetService
    Online Security: OnlineSecurity
    Online Backup: OnlineBackup
    Device Protection: DeviceProtection
    Tech Support: TechSupport
    Streaming TV: StreamingTV
    Streaming Movies: StreamingMovies
    Paperless Billing: PaperlessBilling
    Payment Method: PaymentMethod
    Monthly Charges: MonthlyCharges
    Total Charges: TotalCharges
    Tenure Months: tenure
    Churn Label: Churn
  id_columns:
    - customerID
  drop_columns:
    - Count
    - Country
    - State
    - City
    - Zip Code
    - Lat Long
    - Latitude
    - Longitude
    - Churn Value
    - Churn Score
    - CLTV
    - Churn Reason
  required_columns:
    - customerID
    - gender
    - SeniorCitizen
    - Partner
    - Dependents
    - tenure
    - PhoneService
    - MultipleLines
    - InternetService
    - OnlineSecurity
    - OnlineBackup
    - DeviceProtection
    - TechSupport
    - StreamingTV
    - StreamingMovies
    - Contract
    - PaperlessBilling
    - PaymentMethod
    - MonthlyCharges
    - TotalCharges
    - Churn
  numeric_features:
    - tenure
    - MonthlyCharges
    - TotalCharges
  categorical_features:
    - gender
    - SeniorCitizen
    - Partner
    - Dependents
    - PhoneService
    - MultipleLines
    - InternetService
    - OnlineSecurity
    - OnlineBackup
    - DeviceProtection
    - TechSupport
    - StreamingTV
    - StreamingMovies
    - Contract
    - PaperlessBilling
    - PaymentMethod
  numeric_coercion_columns:
    - TotalCharges
  na_values:
    - ""
    - " "
  infer_remaining_features: false

split:
  test_size: 0.2
  validation_size: 0.1
  random_state: 42

model:
  name: logistic_regression
  params:
    C: 1.0
    class_weight: balanced
    max_iter: 1000
    solver: lbfgs

artifacts:
  root_dir: artifacts
  training_runs_dir: training
  model_directory: model
  model_filename: model.joblib
  metrics_directory: metrics
  metrics_filename: metrics.json
  metadata_directory: metadata
  metadata_filename: run.json
  validation_report_filename: validation.json
  config_directory: config
  config_snapshot_filename: training.yaml
