apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: churnops-production

resources:
  - ../../base
  - ../../addons/monitoring-operator
  - namespace.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: churnops-runtime-env
    envs:
      - runtime.env

images:
  - name: churnops/inference-api
    newName: churnops/inference-api
    newTag: production

patches:
  - path: deployment-patch.yaml
  - path: pvc-patch.yaml
