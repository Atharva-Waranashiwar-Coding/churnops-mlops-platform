apiVersion: apps/v1
kind: Deployment
metadata:
  name: churnops-inference
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: churnops-inference
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: churnops-inference
    spec:
      serviceAccountName: churnops-inference
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: inference-api
          image: churnops/inference-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: CHURNOPS_CONFIG
              value: /app/configs/base.yaml
          envFrom:
            - configMapRef:
                name: churnops-runtime-env
            - secretRef:
                name: churnops-runtime-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: artifacts
              mountPath: /app/artifacts
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: churnops-inference-artifacts
        - name: tmp
          emptyDir: {}
