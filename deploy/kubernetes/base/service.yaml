apiVersion: v1
kind: Service
metadata:
  name: churnops-inference
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "80"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: churnops-inference
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
