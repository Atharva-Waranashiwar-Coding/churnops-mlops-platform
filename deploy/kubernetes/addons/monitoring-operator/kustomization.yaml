apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - servicemonitor.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: churnops-grafana-dashboard
    files:
      - churnops-inference-observability.json=dashboards/churnops-inference-observability.json
    options:
      labels:
        grafana_dashboard: "1"
