global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: churnops-inference-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - inference-api:8000
        labels:
          service: churnops-inference-api

  - job_name: churnops-prometheus
    static_configs:
      - targets:
          - prometheus:9090
        labels:
          service: churnops-prometheus
